        /* ===== كود الـ CSS الخاص بك بالكامل وبدون أي تعديل ===== */
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
            scroll-behavior: smooth;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-circle {
            width: 40px;
            height: 40px;
            background: gold;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }

        .brand-sub {
            font-size: 12px;
            color: #aaa;
        }

        /* NAV LINKS */
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: gold;
        }

        /* ===== DROPDOWN MENU ===== */
        .dropdown {
            position: relative;
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            right: 0;
            background: #1b1b1b;
            min-width: 220px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none;
            overflow: hidden;
            animation: fadeIn 0.2s ease-in-out;
        }

        html[dir="rtl"] .dropdown-content {
            left: 0;
            right: auto;
        }

        .dropdown-content a {
            display: block;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #333;
            transition: 0.3s;
            font-size: 14px;
            text-align: start;
        }

        .dropdown-content a:hover {
            background: gold;
            color: black;
        }

        .dropdown:hover .dropdown-content,
        .dropdown.active .dropdown-content {
            display: block;
        }

        /* LANG */
        .lang-switcher a {
            margin: 0 5px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            cursor: pointer;
        }

        .active-lang {
            color: gold !important;
            font-weight: bold;
        }

        /* HERO */
        .hero-section {
            height: 100vh;
            background: url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=1200") center/cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
        }

        .hero-content {
            position: relative;
            max-width: 700px;
        }

        .hero-content h1 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .hero-content p {
            color: #ddd;
        }

        /* BUTTON */
        .btn-primary, .btn-order {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: gold;
            color: black;
            border-radius: 6px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-primary:hover,
        .btn-order:hover {
            transform: scale(1.05);
        }

        /* PRODUCTS */
        .container {
            padding: 80px 40px;
        }

        .decor-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 26px;
            margin-bottom: 20px;
            color: gold;
            text-align: start;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* التحكم في إخفاء المنتجات الزائدة بشكل افتراضي */
        .products-grid:not(.expanded) .product-card:nth-child(n+5) {
            display: none;
        }

        .product-card {
            background: #1b1b1b;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: start;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .image-box img.main-product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 10px 10px 0 0;
        }

        .image-box img.main-product-img:hover {
            transform: scale(1.02);
        }

        /* THUMBNAILS */
        .thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 8px 10px;
            background: #151515;
            border-bottom: 1px solid #252525;
        }

        .thumb-img {
            width: 100%;
            height: 42px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .thumb-img:hover {
            border-color: gold;
        }

        .active-thumb {
            border-color: gold;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.4);
        }

        /* CARD TEXT */
        .card-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-details h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .card-details p {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .product-note {
            display: inline-block;
            font-size: 12px;
            color: gold;
            background: rgba(255, 215, 0, 0.08);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: auto;
            margin-bottom: 10px;
            width: fit-content;
        }

        /* SHOW MORE */
        .show-more-box {
            text-align: center;
            margin-top: 30px;
        }

        .btn-show-more {
            background: transparent;
            color: gold;
            border: 2px solid gold;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-show-more:hover {
            background: gold;
            color: black;
            transform: scale(1.05);
        }

        /* CONTACT */
        .contact-section {
            padding: 60px 40px;
            background: #111;
            text-align: center;
        }

        .contact-title {
            font-size: 28px;
            margin-bottom: 30px;
            color: gold;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .contact-card {
            background: #1b1b1b;
            padding: 20px;
            border-radius: 12px;
        }

        .contact-card i {
            font-size: 28px;
            color: gold;
            margin-bottom: 10px;
        }

        /* FOOTER */
        .main-footer {
            text-align: center;
            padding: 20px;
            background: black;
            color: #aaa;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .navbar {
                position: sticky;
                padding: 10px 15px;
            }

            .nav-container {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .logo {
                flex-direction: column;
                gap: 4px;
            }

            .brand-name {
                font-size: 16px;
            }

            .nav-links {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
                width: 100%;
                padding: 0;
            }

            .nav-links li {
                font-size: 13px;
            }

            .dropdown-content {
                position: absolute;
                top: 100%;
                left: 50%;
                right: auto;

                font-size: 24px;
                line-height: 1.4;
            }

            .hero-content p {
                font-size: 13px;
                margin-top: 8px;
            }

            .container {
                padding: 30px 15px;
            }

            .section-title {
                font-size: 19px;
                text-align: center;
            }
        }
    </style>
</head>

        // دالة تبديل الصورة الرئيسية للمنتج عند النقر على الصور المصغرة (نقشات)
        function changeProductImage(thumbElement, mainImgId) {
            const mainImg = document.getElementById(mainImgId);
            mainImg.src = thumbElement.src;
            
            // تحديث خط تحديد الإطار الذهبي النشط للصور المصغرة
            const parent = thumbElement.parentElement;
            const thumbs = parent.getElementsByClassName('thumb-img');
            for(let t of thumbs) {
                t.classList.remove('active-thumb');
            }
            thumbElement.classList.add('active-thumb');
        }

        // دالة التحكم في زر "عرض المزيد / عرض أقل" للمنتجات داخل الأقسام
        function toggleSectionExpand(btn, gridId, lang) {
            const grid = document.getElementById(gridId);
            const isExpanded = grid.classList.toggle('expanded');
            const labels = multilingualData[lang];
            btn.innerHTML = isExpanded 
                ? `${labels.show_less} <i class="fa-solid fa-chevron-up"></i>` 
                : `${labels.show_more} <i class="fa-solid fa-chevron-down"></i>`;
        }

        // المحرك الرئيسي لتحديث نصوص ولغة الواجهة ديناميكياً
        function changeLanguage(lang) {
            const data = multilingualData[lang];
            
            // 1. تحديث اتجاه لغة الصفحة بالكامل (RTL للمد العربي والكردي و LTR للإنجليزي)
            const htmlTag = document.getElementById('html-tag');
            htmlTag.lang = lang;
            htmlTag.dir = (lang === 'ar' || lang === 'ku') ? 'rtl' : 'ltr';

            // 2. تحديث تلوين زر اللغة النشط بالـ Navbar
            document.getElementById('btn-lang-ar').classList.remove('active-lang');
            document.getElementById('btn-lang-ku').classList.remove('active-lang');
            document.getElementById('btn-lang-en').classList.remove('active-lang');
            document.getElementById(`btn-lang-${lang}`).classList.add('active-lang');

            // 3. تحديث نصوص القوائم والنافبار والهيرو
            document.getElementById('link-home').innerText = data.home;
            document.getElementById('link-products').innerHTML = `${data.products} <i class="fa-solid fa-chevron-down" style="font-size:10px; margin-inline-start:4px;"></i>`;
            document.getElementById('link-contact').innerText = data.contact;
            
            document.getElementById('hero-title').innerText = data.hero_title;
            document.getElementById('hero-sub').innerText = data.hero_sub;
            document.getElementById('hero-btn-browse').innerText = data.btn_browse;

            // 4. تحديث قسم الاتصال والـ Footer والواتساب
            document.getElementById('contact-title').innerText = data.contact_title;
            document.getElementById('label-address').innerText = data.address_label;
            document.getElementById('label-phone').innerText = data.phone_label;
            document.getElementById('label-hours').innerText = data.hours_label;
            
            document.getElementById('info-address').innerText = companyInfo[`location_${lang}`];
            document.getElementById('info-phone').innerText = companyInfo.phone;
            document.getElementById('info-hours').innerText = data.hours_val;
            
            document.getElementById('text-whatsapp-btn').innerText = data.btn_order;
            document.getElementById('btn-whatsapp-contact').href = `https://wa.me/${companyInfo.phone}`;
            document.getElementById('footer-text').innerText = data.footer_text;

            // 5. تحديث روابط القائمة المنسدلة (Dropdown Categories) بالنافبار
            const dropdownMenu = document.getElementById('dropdown-categories');
            dropdownMenu.innerHTML = '';
            data.sections.forEach(sec => {
                dropdownMenu.innerHTML += `<a href="#sec-${sec.id}">${sec.title}</a>`;
            });

            // 6. بناء وعرض الأقسام وبطاقات المنتجات ديناميكياً بالكامل
            const productsArea = document.getElementById('products-area');
            productsArea.innerHTML = ''; // تصفير المحتوى القديم لإعادة البناء باللغة الجديدة

            data.sections.forEach((section, secIndex) => {
                const gridId = `grid-${section.id}`;
                
                // إنشاء هيكل القسم الأساسي
                let sectionHTML = `
                    <section class="decor-section" id="sec-${section.id}">
                        <h2 class="section-title">${section.title}</h2>
                        <div class="products-grid" id="${gridId}">
                `;

                // إضافة بطاقات المنتجات داخل القسم الحالي
                section.items.forEach((item, itemIndex) => {
                    const mainImgId = `img-${secIndex}-${itemIndex}`;
                    
                    // توليد كود شريط الصور المصغرة (النقشات) إذا كانت متوفرة في كودك
                    let thumbnailsHTML = '';
                    if (item.images && item.images.length > 1) {
                        thumbnailsHTML = `<div class="thumbnails-grid">`;
                        item.images.forEach((imgUrl, thumbIndex) => {
                            const activeClass = (thumbIndex === 0) ? 'active-thumb' : '';
                            thumbnailsHTML += `
                                <img src="${imgUrl}" 
                                     class="thumb-img ${activeClass}" 
                                     onclick="changeProductImage(this, '${mainImgId}')" 
                                     alt="نقشة">
                            `;
                        });
                        thumbnailsHTML += `</div>`;
                    }

                    // توليد البنية البرمجية لبطاقة المنتج كاملة
                    sectionHTML += `
                        <div class="product-card">
                            <div class="image-box">
                                <img src="${item.placeholder}" id="${mainImgId}" class="main-product-img" alt="${item.name}">
                                ${thumbnailsHTML}
                            </div>
                            <div class="card-details">
                                <h3>${item.name}</h3>
                                <p>${item.features}</p>
                                ${item.note ? `<span class="product-note">${item.note}</span>` : ''}
                            </div>
                        </div>
                    `;
                });

                sectionHTML += `</div>`; // إغلاق شبكة المنتجات (products-grid)

                // إضافة زر "عرض المزيد" فقط إذا كانت المنتجات داخل القسم أكثر من 4
                if (section.items.length > 4) {
                    sectionHTML += `
                        <div class="show-more-box">
                            <button class="btn-show-more" onclick="toggleSectionExpand(this, '${gridId}', '${lang}')">
                                ${data.show_more} <i class="fa-solid fa-chevron-down"></i>
                            </button>
                        </div>
                    `;
                }

                sectionHTML += `</section>`; // إغلاق قسم الديكور بالكامل
                productsArea.insertAdjacentHTML('beforeend', sectionHTML);
            });
        }

        // تشغيل اللغة العربية تلقائياً كخيار افتراضي عند تحميل الموقع لأول مرة
        document.addEventListener("DOMContentLoaded", () => {
            changeLanguage('ar');
        });
    </script>
